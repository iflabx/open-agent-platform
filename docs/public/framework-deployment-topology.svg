<svg width="1680" height="1160" viewBox="0 0 1680 1160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1680" height="1160" rx="40" fill="#F5F7F8"/>
  <rect x="32" y="32" width="1616" height="1096" rx="32" fill="#FFFFFF" stroke="#D7DEE5" stroke-width="2"/>

  <text x="84" y="104" fill="#111827" font-size="44" font-family="IBM Plex Sans, PingFang SC, Microsoft YaHei, sans-serif" font-weight="700">部署拓扑建议图</text>
  <text x="84" y="146" fill="#4B5563" font-size="22" font-family="IBM Plex Sans, PingFang SC, Microsoft YaHei, sans-serif">示意几万人规模企业的环境划分与生产分区部署方式，强调推理、平台服务、数据、观测和企业集成隔离。</text>

  <g font-family="IBM Plex Sans, PingFang SC, Microsoft YaHei, sans-serif">
    <rect x="84" y="196" width="250" height="812" rx="28" fill="#F8FAFC" stroke="#D7DEE5" stroke-width="2"/>
    <text x="122" y="246" fill="#334155" font-size="30" font-weight="700">环境划分</text>

    <rect x="118" y="286" width="182" height="142" rx="20" fill="#DBEAFE"/>
    <text x="182" y="340" fill="#1E3A8A" font-size="30" font-weight="700">dev</text>
    <text x="144" y="376" fill="#334155" font-size="17">研发联调</text>
    <text x="144" y="402" fill="#334155" font-size="17">单机或轻量集群</text>

    <rect x="118" y="460" width="182" height="142" rx="20" fill="#FDE68A"/>
    <text x="158" y="514" fill="#92400E" font-size="30" font-weight="700">staging</text>
    <text x="144" y="550" fill="#334155" font-size="17">发布前验证</text>
    <text x="144" y="576" fill="#334155" font-size="17">灰度基线与回归测试</text>

    <rect x="118" y="634" width="182" height="240" rx="20" fill="#D1FAE5"/>
    <text x="170" y="688" fill="#065F46" font-size="30" font-weight="700">prod</text>
    <text x="144" y="724" fill="#334155" font-size="17">正式生产、分区隔离</text>
    <text x="144" y="750" fill="#334155" font-size="17">入口双实例</text>
    <text x="144" y="776" fill="#334155" font-size="17">核心服务双实例</text>
    <text x="144" y="802" fill="#334155" font-size="17">数据与推理独立扩容</text>
    <text x="144" y="828" fill="#334155" font-size="17">发布前压测与回滚预案</text>

    <rect x="370" y="196" width="1226" height="812" rx="28" fill="#F9FAFB" stroke="#E2E8F0" stroke-width="2"/>
    <text x="410" y="246" fill="#111827" font-size="30" font-weight="700">生产环境建议分区</text>

    <rect x="410" y="286" width="352" height="202" rx="24" fill="#ECFDF5"/>
    <text x="444" y="334" fill="#047857" font-size="28" font-weight="700">接入层</text>
    <text x="444" y="372" fill="#1F2937" font-size="19">APISIX</text>
    <text x="444" y="400" fill="#1F2937" font-size="19">WAF / TLS / 灰度 / 限流 / 审计</text>
    <text x="444" y="428" fill="#475569" font-size="17">统一公网边界，建议至少双实例</text>
    <text x="444" y="454" fill="#475569" font-size="17">与企业 SSO / IAM 做认证接入协同</text>

    <rect x="804" y="286" width="372" height="202" rx="24" fill="#FFF7ED"/>
    <text x="838" y="334" fill="#C2410C" font-size="28" font-weight="700">平台服务区</text>
    <text x="838" y="370" fill="#1F2937" font-size="17">AgentifUI / OpenClaw / Portal BFF</text>
    <text x="838" y="396" fill="#1F2937" font-size="18">Dify / RAGFlow / Coze Studio</text>
    <text x="838" y="422" fill="#1F2937" font-size="18">LangGraph / LangChain / LlamaIndex</text>
    <text x="838" y="450" fill="#475569" font-size="16">默认统一门户，条件成品化超级智能体前台</text>
    <text x="838" y="474" fill="#475569" font-size="16">业务编排、运营治理和前台会话集中区</text>

    <rect x="1218" y="286" width="342" height="202" rx="24" fill="#FFFBEB"/>
    <text x="1252" y="334" fill="#B45309" font-size="28" font-weight="700">推理区</text>
    <text x="1252" y="372" fill="#1F2937" font-size="18">LiteLLM / vLLM / Qwen 模型池</text>
    <text x="1252" y="398" fill="#1F2937" font-size="18">通用池 / 代码池 / 安全审查池</text>
    <text x="1252" y="424" fill="#475569" font-size="17">GPU 节点独立扩容，避免与业务服务抢资源</text>

    <rect x="410" y="530" width="352" height="212" rx="24" fill="#F0F9FF"/>
    <text x="444" y="578" fill="#0369A1" font-size="28" font-weight="700">数据区</text>
    <text x="444" y="616" fill="#1F2937" font-size="18">PostgreSQL / Redis / MinIO</text>
    <text x="444" y="642" fill="#1F2937" font-size="18">Weaviate / Milvus / Elasticsearch</text>
    <text x="444" y="668" fill="#475569" font-size="17">有状态组件独立存储、备份、恢复与高可用</text>
    <text x="444" y="694" fill="#475569" font-size="17">检索底座按规模演进，不默认长期全量并行</text>

    <rect x="804" y="530" width="372" height="212" rx="24" fill="#F5F3FF"/>
    <text x="838" y="578" fill="#6D28D9" font-size="28" font-weight="700">数据治理与协议区</text>
    <text x="838" y="616" fill="#1F2937" font-size="18">OpenMetadata / SeaTunnel / dbt Core / Apache Tika</text>
    <text x="838" y="642" fill="#1F2937" font-size="18">agentgateway / MCP Server / A2A Client-Server</text>
    <text x="838" y="668" fill="#475569" font-size="17">离线治理链路与 southbound 协议能力分区</text>
    <text x="838" y="694" fill="#475569" font-size="17">避免治理任务与在线推理链路争抢资源</text>

    <rect x="1218" y="530" width="342" height="212" rx="24" fill="#F8FAFC"/>
    <text x="1252" y="578" fill="#334155" font-size="28" font-weight="700">观测区</text>
    <text x="1252" y="616" fill="#1F2937" font-size="18">OpenTelemetry Collector</text>
    <text x="1252" y="642" fill="#1F2937" font-size="18">Prometheus / Grafana / Loki</text>
    <text x="1252" y="668" fill="#475569" font-size="17">平台级指标、日志、追踪统一收口</text>
    <text x="1252" y="694" fill="#475569" font-size="17">与 LangFuse 构成 AI 级与平台级双层观测</text>

    <rect x="410" y="784" width="1150" height="180" rx="24" fill="#EEF2FF"/>
    <text x="444" y="832" fill="#4338CA" font-size="28" font-weight="700">企业集成区</text>
    <text x="444" y="870" fill="#1F2937" font-size="19">企业 SSO / IAM / KMS / 证书体系 / 审计日志平台 / 安全审查服务</text>
    <text x="444" y="898" fill="#475569" font-size="17">优先复用企业现有能力，作为外部依赖系统对接，不在平台内重复建设。</text>
    <text x="444" y="924" fill="#475569" font-size="17">上线前关注备份恢复、容量基线、发布回滚、入口与核心服务双实例等最低要求。</text>

    <path d="M762 387H804" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
    <path d="M1176 387H1218" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
    <path d="M586 488V530" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
    <path d="M990 488V530" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
    <path d="M1388 488V530" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
    <path d="M986 742V784" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
