<svg width="1680" height="1080" viewBox="0 0 1680 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1680" height="1080" rx="40" fill="#F7F6F3"/>
  <rect x="32" y="32" width="1616" height="1016" rx="32" fill="#FFFFFF" stroke="#DDD8CF" stroke-width="2"/>

  <text x="84" y="106" fill="#111827" font-size="44" font-family="IBM Plex Sans, PingFang SC, Microsoft YaHei, sans-serif" font-weight="700">关键组件职责边界图</text>
  <text x="84" y="148" fill="#4B5563" font-size="22" font-family="IBM Plex Sans, PingFang SC, Microsoft YaHei, sans-serif">这张图专门解释最容易混淆的几个控制点：谁面向公网、谁统一门户、谁承接 southbound 协议、谁是唯一模型入口。</text>

  <g font-family="IBM Plex Sans, PingFang SC, Microsoft YaHei, sans-serif">
    <rect x="84" y="196" width="380" height="692" rx="28" fill="#EEF6FF" stroke="#CFE2F6" stroke-width="2"/>
    <text x="120" y="246" fill="#1D4ED8" font-size="30" font-weight="700">北向入口与门户面</text>

    <rect x="120" y="278" width="308" height="104" rx="20" fill="#D8EAFE"/>
    <text x="206" y="320" fill="#1E3A8A" font-size="24" font-weight="700">用户 / 渠道 / 系统</text>
    <text x="152" y="350" fill="#1E40AF" font-size="17">Web、IM、工单、Open API、业务系统入口</text>

    <path d="M274 382V414" stroke="#60A5FA" stroke-width="4" stroke-linecap="round"/>

    <rect x="120" y="414" width="308" height="136" rx="20" fill="#BFDBFE"/>
    <text x="224" y="458" fill="#1D4ED8" font-size="30" font-weight="700">APISIX</text>
    <text x="152" y="490" fill="#1F2937" font-size="17">统一公网入口</text>
    <text x="152" y="516" fill="#1F2937" font-size="17">认证接入、限流、灰度、入口审计</text>
    <text x="152" y="542" fill="#475569" font-size="16">只负责北向流量治理，不承担模型统一入口</text>

    <path d="M274 550V582" stroke="#60A5FA" stroke-width="4" stroke-linecap="round"/>

    <rect x="120" y="582" width="308" height="188" rx="20" fill="#DBEAFE"/>
    <text x="146" y="626" fill="#1E3A8A" font-size="28" font-weight="700">AgentifUI / OpenClaw</text>
    <text x="152" y="656" fill="#1F2937" font-size="17">默认统一门户 / 条件超级智能体前台</text>
    <text x="152" y="682" fill="#1F2937" font-size="17">应用目录、会话承接、北向 BFF</text>
    <text x="152" y="708" fill="#1F2937" font-size="17">反馈入口、运营后台、统一 API</text>
    <text x="152" y="736" fill="#475569" font-size="16">不直接承接核心编排，不绕过网关访问模型</text>

    <rect x="120" y="790" width="308" height="76" rx="18" fill="#E8F1FB"/>
    <text x="150" y="826" fill="#475569" font-size="16">北向口径：APISIX 收口流量，第 3 层承接统一门户</text>
    <text x="150" y="848" fill="#475569" font-size="16">或条件引入的超级智能体前台。</text>

    <rect x="504" y="196" width="500" height="692" rx="28" fill="#FFF7ED" stroke="#F0D6B3" stroke-width="2"/>
    <text x="540" y="246" fill="#C2410C" font-size="30" font-weight="700">业务编排与知识执行面</text>

    <rect x="540" y="278" width="428" height="124" rx="20" fill="#FBD7B0"/>
    <text x="640" y="318" fill="#9A3412" font-size="24" font-weight="700">Dify / RAGFlow</text>
    <text x="672" y="348" fill="#9A3412" font-size="24" font-weight="700">Coze Studio</text>
    <text x="580" y="376" fill="#7C2D12" font-size="17">标准场景主平台中枢，承担业务交付主路径</text>

    <rect x="540" y="434" width="428" height="124" rx="20" fill="#FCE6C9"/>
    <text x="652" y="478" fill="#9A3412" font-size="28" font-weight="700">LangGraph / LangChain</text>
    <text x="580" y="510" fill="#7C2D12" font-size="17">复杂业务、自研 Agent Runtime、状态控制</text>
    <text x="580" y="536" fill="#7C2D12" font-size="17">工程化编排与长时运行能力</text>

    <rect x="540" y="590" width="428" height="124" rx="20" fill="#FCEDE0"/>
    <text x="698" y="634" fill="#9A3412" font-size="28" font-weight="700">LlamaIndex</text>
    <text x="580" y="666" fill="#7C2D12" font-size="17">复杂知识接入、索引与检索编排</text>
    <text x="580" y="692" fill="#7C2D12" font-size="17">服务知识工程与受控 RAG</text>

    <rect x="540" y="746" width="428" height="112" rx="20" fill="#FFF2E8"/>
    <text x="576" y="792" fill="#7C2D12" font-size="18">业务编排层负责“把事情做成”，</text>
    <text x="576" y="818" fill="#7C2D12" font-size="18">不是统一模型入口，也不是北向公网流量入口。</text>

    <rect x="1044" y="196" width="552" height="692" rx="28" fill="#ECFDF5" stroke="#CAE7D6" stroke-width="2"/>
    <text x="1080" y="246" fill="#047857" font-size="30" font-weight="700">southbound 协议面与模型面</text>

    <rect x="1080" y="278" width="224" height="148" rx="20" fill="#C8F2DA"/>
    <text x="1146" y="322" fill="#065F46" font-size="30" font-weight="700">agentgateway</text>
    <text x="1112" y="356" fill="#065F46" font-size="17">内部 AI 原生协议网关</text>
    <text x="1112" y="382" fill="#065F46" font-size="17">MCP / A2A / OpenAPI 到 MCP</text>
    <text x="1112" y="408" fill="#065F46" font-size="17">负责 southbound 接入与治理</text>

    <rect x="1332" y="278" width="228" height="148" rx="20" fill="#DDF7E7"/>
    <text x="1406" y="322" fill="#166534" font-size="30" font-weight="700">MCP / A2A</text>
    <text x="1366" y="356" fill="#166534" font-size="17">工具、上下文、远程 Agent</text>
    <text x="1366" y="382" fill="#166534" font-size="17">agent-to-tool / agent-to-agent 协议</text>
    <path d="M1304 352H1332" stroke="#34D399" stroke-width="4" stroke-linecap="round"/>

    <rect x="1080" y="468" width="224" height="148" rx="20" fill="#FEF3C7"/>
    <text x="1160" y="514" fill="#92400E" font-size="30" font-weight="700">LiteLLM</text>
    <text x="1108" y="548" fill="#78350F" font-size="17">唯一模型入口</text>
    <text x="1108" y="574" fill="#78350F" font-size="17">统一路由、配额、成本、熔断</text>

    <rect x="1332" y="468" width="228" height="148" rx="20" fill="#FFFBEB"/>
    <text x="1390" y="514" fill="#92400E" font-size="30" font-weight="700">vLLM + Qwen</text>
    <text x="1366" y="548" fill="#78350F" font-size="17">推理执行、GPU 调度、模型池拆分</text>
    <text x="1366" y="574" fill="#78350F" font-size="17">不直接面向上层业务系统暴露</text>
    <path d="M1304 542H1332" stroke="#F59E0B" stroke-width="4" stroke-linecap="round"/>

    <rect x="1080" y="658" width="480" height="200" rx="20" fill="#F0FDF4"/>
    <text x="1116" y="704" fill="#166534" font-size="24" font-weight="700">横向能力始终覆盖全部执行面</text>
    <text x="1116" y="740" fill="#1F2937" font-size="18">数据治理与知识面</text>
    <text x="1116" y="766" fill="#475569" font-size="16">OpenMetadata / SeaTunnel / dbt Core / Apache Tika</text>
    <text x="1116" y="792" fill="#475569" font-size="16">Weaviate / Milvus / Elasticsearch</text>
    <text x="1116" y="826" fill="#1F2937" font-size="18">治理与观测面</text>
    <text x="1116" y="852" fill="#475569" font-size="16">Casbin / LangFuse / OpenTelemetry / Prometheus / Grafana / Loki / k6</text>
  </g>

  <path d="M464 482H504" stroke="#94A3B8" stroke-width="5" stroke-linecap="round"/>
  <path d="M1004 482H1044" stroke="#94A3B8" stroke-width="5" stroke-linecap="round"/>

  <rect x="84" y="918" width="1512" height="82" rx="22" fill="#111827"/>
  <text x="110" y="964" fill="#F9FAFB" font-size="18" font-family="IBM Plex Sans, PingFang SC, Microsoft YaHei, sans-serif">口径收敛：APISIX 负责北向统一入口，AgentifUI 负责默认门户与 BFF，OpenClaw 条件承接超级智能体前台，agentgateway 负责内部 AI 协议网关，LiteLLM 负责唯一模型入口。</text>
</svg>
