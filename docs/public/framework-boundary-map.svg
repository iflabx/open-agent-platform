<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="980" rx="40" fill="#F7F6F3"/>
  <rect x="32" y="32" width="1536" height="916" rx="32" fill="#FFFFFF" stroke="#DDD8CF" stroke-width="2"/>
  <text x="84" y="106" fill="#111827" font-size="44" font-family="IBM Plex Sans, PingFang SC, Microsoft YaHei, sans-serif" font-weight="700">关键组件职责边界图</text>
  <text x="84" y="148" fill="#4B5563" font-size="22" font-family="IBM Plex Sans, PingFang SC, Microsoft YaHei, sans-serif">这张图专门用来解释最容易混淆的几个控制点：谁面向公网、谁统一门户、谁承接 southbound 协议、谁是唯一模型入口。</text>

  <g font-family="IBM Plex Sans, PingFang SC, Microsoft YaHei, sans-serif">
    <rect x="84" y="196" width="332" height="620" rx="28" fill="#EEF6FF" stroke="#CFE2F6" stroke-width="2"/>
    <text x="118" y="244" fill="#1D4ED8" font-size="30" font-weight="700">北向入口与门户面</text>
    <rect x="118" y="278" width="264" height="84" rx="20" fill="#D8EAFE"/>
    <text x="188" y="318" fill="#1E3A8A" font-size="24" font-weight="700">用户 / 渠道 / 系统</text>
    <text x="170" y="346" fill="#1E40AF" font-size="18">Web、IM、工单、Open API、业务系统</text>
    <path d="M250 362V394" stroke="#60A5FA" stroke-width="4" stroke-linecap="round"/>
    <rect x="118" y="394" width="264" height="110" rx="20" fill="#BFDBFE"/>
    <text x="214" y="438" fill="#1D4ED8" font-size="28" font-weight="700">APISIX</text>
    <text x="150" y="470" fill="#1E3A8A" font-size="18">统一公网入口、认证接入、流量治理、灰度和入口审计</text>
    <path d="M250 504V536" stroke="#60A5FA" stroke-width="4" stroke-linecap="round"/>
    <rect x="118" y="536" width="264" height="132" rx="20" fill="#DBEAFE"/>
    <text x="198" y="580" fill="#1E3A8A" font-size="28" font-weight="700">AgentifUI + BFF</text>
    <text x="148" y="612" fill="#1F2937" font-size="18">统一门户、应用目录、会话承接、反馈入口、北向统一 API</text>
    <rect x="118" y="698" width="264" height="88" rx="18" fill="#E8F1FB"/>
    <text x="146" y="736" fill="#334155" font-size="20" font-weight="600">边界提醒</text>
    <text x="146" y="766" fill="#475569" font-size="17">门户不直接承担核心编排，不直接绕过网关访问模型。</text>

    <rect x="456" y="196" width="436" height="620" rx="28" fill="#FFF7ED" stroke="#F0D6B3" stroke-width="2"/>
    <text x="490" y="244" fill="#C2410C" font-size="30" font-weight="700">业务编排与知识执行面</text>
    <rect x="490" y="278" width="368" height="116" rx="20" fill="#FBD7B0"/>
    <text x="600" y="322" fill="#9A3412" font-size="28" font-weight="700">Dify / RAGFlow / Coze Studio</text>
    <text x="532" y="356" fill="#7C2D12" font-size="18">标准场景主平台中枢，承接知识应用、低代码流程与业务交付</text>
    <rect x="490" y="426" width="368" height="116" rx="20" fill="#FCE6C9"/>
    <text x="584" y="470" fill="#9A3412" font-size="28" font-weight="700">LangGraph / LangChain</text>
    <text x="528" y="504" fill="#7C2D12" font-size="18">复杂业务、长时运行、自研 Agent Runtime 与工程化编排</text>
    <rect x="490" y="574" width="368" height="116" rx="20" fill="#FCEDE0"/>
    <text x="612" y="618" fill="#9A3412" font-size="28" font-weight="700">LlamaIndex</text>
    <text x="548" y="652" fill="#7C2D12" font-size="18">复杂知识接入、索引与检索编排，服务知识工程与受控 RAG</text>
    <rect x="490" y="722" width="368" height="64" rx="18" fill="#FFF2E8"/>
    <text x="526" y="762" fill="#7C2D12" font-size="18">主平台是业务交付面，不是统一模型入口，也不是北向公网网关。</text>

    <rect x="932" y="196" width="584" height="620" rx="28" fill="#ECFDF5" stroke="#CAE7D6" stroke-width="2"/>
    <text x="966" y="244" fill="#047857" font-size="30" font-weight="700">southbound 协议面与模型面</text>
    <rect x="966" y="278" width="244" height="132" rx="20" fill="#C8F2DA"/>
    <text x="1030" y="322" fill="#065F46" font-size="28" font-weight="700">agentgateway</text>
    <text x="998" y="356" fill="#065F46" font-size="18">内部 AI 原生协议网关</text>
    <text x="998" y="382" fill="#065F46" font-size="18">MCP / A2A / OpenAPI 到 MCP</text>
    <rect x="1240" y="278" width="242" height="132" rx="20" fill="#DDF7E7"/>
    <text x="1328" y="322" fill="#166534" font-size="28" font-weight="700">MCP / A2A</text>
    <text x="1268" y="356" fill="#166534" font-size="18">工具、上下文、远程 Agent</text>
    <text x="1266" y="382" fill="#166534" font-size="18">southbound 互操作协议</text>
    <path d="M1210 344H1240" stroke="#34D399" stroke-width="4" stroke-linecap="round"/>

    <rect x="966" y="452" width="244" height="132" rx="20" fill="#FEF3C7"/>
    <text x="1044" y="498" fill="#92400E" font-size="30" font-weight="700">LiteLLM</text>
    <text x="992" y="532" fill="#78350F" font-size="18">唯一模型入口、路由、配额、成本、熔断</text>
    <rect x="1240" y="452" width="242" height="132" rx="20" fill="#FFFBEB"/>
    <text x="1312" y="498" fill="#92400E" font-size="30" font-weight="700">vLLM + Qwen</text>
    <text x="1268" y="532" fill="#78350F" font-size="18">推理执行、GPU 调度、模型池拆分</text>
    <path d="M1210 518H1240" stroke="#F59E0B" stroke-width="4" stroke-linecap="round"/>

    <rect x="966" y="626" width="516" height="160" rx="20" fill="#F0FDF4"/>
    <text x="1000" y="670" fill="#166534" font-size="24" font-weight="700">围绕全部执行面的横向能力</text>
    <text x="1000" y="708" fill="#1F2937" font-size="19">数据治理与知识面：OpenMetadata / SeaTunnel / dbt Core / Apache Tika / Weaviate / Milvus / Elasticsearch</text>
    <text x="1000" y="742" fill="#1F2937" font-size="19">治理与观测面：Casbin / LangFuse / OpenTelemetry / Prometheus / Grafana / Loki / k6</text>
  </g>

  <path d="M416 472H456" stroke="#94A3B8" stroke-width="5" stroke-linecap="round"/>
  <path d="M892 472H932" stroke="#94A3B8" stroke-width="5" stroke-linecap="round"/>

  <rect x="84" y="846" width="1432" height="70" rx="22" fill="#111827"/>
  <text x="116" y="890" fill="#F9FAFB" font-size="20" font-family="IBM Plex Sans, PingFang SC, Microsoft YaHei, sans-serif">口径收敛：APISIX 负责北向统一入口，AgentifUI 负责门户与 BFF，agentgateway 负责内部 AI 协议网关，LiteLLM 负责统一模型入口。</text>
</svg>
