    <text x="370" y="812" fill="#1F2937" font-size="23">Weaviate / Milvus / Elasticsearch / Embedding / Reranker</text>
    <text x="1170" y="812" fill="#5B21B6" font-size="21">受控检索、重排、权限过滤</text>

    <rect x="84" y="872" width="1432" height="96" rx="22" fill="#FFFBEB"/>
    <rect x="104" y="893" width="260" height="54" rx="16" fill="#FDE68A"/>
    <text x="126" y="928" fill="#B45309" font-size="28" font-weight="700">7. 模型网关与推理层</text>
