<svg width="1600" height="1300" viewBox="0 0 1600 1300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="1300" rx="40" fill="#F5F7F4"/>
  <rect x="32" y="32" width="1536" height="1236" rx="32" fill="#FFFFFF" stroke="#D8E2DB" stroke-width="2"/>

  <text x="84" y="108" fill="#111827" font-size="44" font-family="IBM Plex Sans, PingFang SC, Microsoft YaHei, sans-serif" font-weight="700">企业级智能体平台九层总体架构图</text>
  <text x="84" y="150" fill="#4B5563" font-size="22" font-family="IBM Plex Sans, PingFang SC, Microsoft YaHei, sans-serif">从用户入口到底层基础设施的正式分层，以及当前方案中已经收敛的关键组件位置。</text>

  <g font-family="IBM Plex Sans, PingFang SC, Microsoft YaHei, sans-serif">
    <rect x="84" y="192" width="1432" height="92" rx="24" fill="#EEF6FF"/>
    <rect x="104" y="211" width="246" height="54" rx="16" fill="#D8EAFE"/>
    <text x="132" y="247" fill="#1D4ED8" font-size="28" font-weight="700">1. 用户与渠道层</text>
    <text x="386" y="235" fill="#1F2937" font-size="22">企业 Web / IM / 工单 / CRM / ERP</text>
    <text x="386" y="261" fill="#475569" font-size="18">统一用户入口、系统入口与 Open API 接入面</text>

    <rect x="84" y="304" width="1432" height="104" rx="24" fill="#ECFDF5"/>
    <rect x="104" y="329" width="324" height="54" rx="16" fill="#C8F2DA"/>
    <text x="130" y="365" fill="#047857" font-size="28" font-weight="700">2. 统一接入与流量治理层</text>
    <rect x="466" y="329" width="176" height="54" rx="16" fill="#D9FBE8"/>
    <rect x="660" y="329" width="214" height="54" rx="16" fill="#D9FBE8"/>
    <text x="521" y="365" fill="#065F46" font-size="24" font-weight="600">APISIX</text>
    <text x="700" y="365" fill="#065F46" font-size="24" font-weight="600">agentgateway</text>
    <text x="912" y="351" fill="#1F2937" font-size="20">北向统一入口、灰度、审计</text>
    <text x="912" y="377" fill="#475569" font-size="17">MCP / A2A southbound 协议接入与治理</text>

    <rect x="84" y="428" width="1432" height="96" rx="24" fill="#FFF7ED"/>
    <rect x="104" y="449" width="270" height="54" rx="16" fill="#FBD7B0"/>
    <text x="130" y="485" fill="#C2410C" font-size="28" font-weight="700">3. 门户与应用层</text>
    <rect x="412" y="449" width="194" height="54" rx="16" fill="#FCE6C9"/>
    <text x="455" y="485" fill="#9A3412" font-size="24" font-weight="600">AgentifUI</text>
