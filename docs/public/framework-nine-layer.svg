    <rect x="390" y="566" width="212" height="46" rx="14" fill="#FCE0EC"/>
    <rect x="620" y="566" width="170" height="46" rx="14" fill="#FCE0EC"/>
    <rect x="808" y="566" width="214" height="46" rx="14" fill="#FCE0EC"/>
    <rect x="1040" y="566" width="150" height="46" rx="14" fill="#FCE0EC"/>
    <rect x="390" y="624" width="212" height="46" rx="14" fill="#FCE0EC"/>
    <rect x="620" y="624" width="170" height="46" rx="14" fill="#FCE0EC"/>
