  <text x="84" y="108" fill="#111827" font-size="44" font-family="IBM Plex Sans, PingFang SC, Microsoft YaHei, sans-serif" font-weight="700">企业级智能体平台九层总体架构图</text>
  <text x="84" y="150" fill="#4B5563" font-size="22" font-family="IBM Plex Sans, PingFang SC, Microsoft YaHei, sans-serif">从用户入口到底层基础设施的正式分层，以及当前方案中已经收敛的关键组件位置。</text>

