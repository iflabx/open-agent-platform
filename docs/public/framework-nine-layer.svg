    <text x="632" y="928" fill="#92400E" font-size="24" font-weight="600">vLLM + Qwen 模型族</text>
    <text x="844" y="928" fill="#78350F" font-size="21">统一模型入口、路由、配额、故障切换</text>

    <rect x="84" y="984" width="1432" height="92" rx="22" fill="#F1F5F9"/>
    <rect x="104" y="1003" width="214" height="54" rx="16" fill="#DDE7F2"/>
