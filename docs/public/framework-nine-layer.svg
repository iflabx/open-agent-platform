    <text x="646" y="495" fill="#475569" font-size="17">反馈回收、运营后台与北向 BFF</text>

    <rect x="84" y="544" width="1432" height="138" rx="24" fill="#FDF2F8"/>
    <rect x="104" y="586" width="246" height="54" rx="16" fill="#F8CFE1"/>
